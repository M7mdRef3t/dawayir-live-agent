        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <circle cx="88" cy="96" r="44" stroke="#00F5FF" stroke-width="12" filter="url(#glowCyan)"/>
